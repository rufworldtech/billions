<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecurPay | Passerelle de Paiement Mobile Money Direct</title>
  <style>
    body { background-color: #060913; color: #f1f5f9; font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
    .checkout-box { max-width: 500px; margin: 40px auto; background-color: #0f172a; border: 1px solid #1e293b; padding: 32px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header { text-align: center; margin-bottom: 28px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; color: #10b981; letter-spacing: 0.5px; }
    .operator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .operator-card { background-color: #060913; border: 2px solid #1e293b; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; font-weight: 700; font-size: 14px; transition: all 0.2s; }
    .operator-card.active-mpesa { border-color: #e11d48; color: #f43f5e; background-color: rgba(225,29,72,0.05); }
    .operator-card.active-orange { border-color: #ea580c; color: #f97316; background-color: rgba(234,88,12,0.05); }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
    input { width: 100%; padding: 14px; background-color: #060913; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; margin-bottom: 20px; }
    input:focus { outline: none; border-color: #10b981; }
    .pay-btn { background-color: #10b981; color: #060913; border: none; padding: 16px; font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pay-btn:hover { background-color: #059669; }
    .status-panel { display: none; margin-top: 24px; background-color: #060913; border: 1px solid #334155; padding: 20px; border-radius: 8px; text-align: center; }
  </style>
  <script>
    function processPayment(e) {
      e.preventDefault();
      document.getElementById('btn-txt').innerText = 'Attente de la validation du PIN sur votre téléphone...';
      setTimeout(() => {
        document.getElementById('status').style.display = 'block';
        document.getElementById('btn-txt').innerText = 'Payer Via Mobile Money';
      }, 2000);
    }
  </script>
</head>
<body>

  <div class="checkout-box">
    <div class="header">
      <div class="logo-text">SecurPay™ By RUF WORLD</div>
      <p style="color: #64748b; font-size: 12px; margin: 6px 0 0 0;">Système de Facturation Sécurisé Mobile Money — RD Congo</p>
    </div>

    <form onsubmit="processPayment(event)">
      <label>Sélectionnez l'opérateur</label>
      <div class="operator-grid">
        <div class="operator-card active-mpesa">Vodacom M-Pesa</div>
        <div class="operator-card active-orange">Orange Money</div>
      </div>

      <label>Numéro de Téléphone (Ex: 081XXXXXXX)</label>
      <input type="text" placeholder="0812345678" required>

      <label>Montant à Payer (USD)</label>
      <input type="text" value="45.00" readonly>

      <button type="submit" class="pay-btn"><span id="btn-txt">Payer Via Mobile Money</span></button>
    </form>

    <div id="status" class="status-panel">
      <div style="font-size: 24px; margin-bottom: 8px;">📲</div>
      <div style="font-weight: 700; color: #10b981; font-size: 15px;">Demande Push Envoyée !</div>
      <p style="color: #64748b; font-size: 13px; margin: 4px 0 0 0;">Veuillez vérifier votre téléphone, tapez votre code PIN secret pour confirmer le paiement de 45.00 USD.</p>
    </div>
  </div>

</body>
</html>
