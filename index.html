<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rufworld Tech | Global Infrastructure</title>
  
  <!-- 1. Fallback Styles: This forces the dark theme even if scripts fail -->
  <style>
    body {
      background-color: #020617 !important; /* Deep Enterprise Dark Blue */
      color: #ffffff !important;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }
    a {
      color: #38bdf8 !important; /* Bright Tech Blue Links */
      text-decoration: none;
      margin-right: 15px;
    }
    .enterprise-header {
      background-color: #0f172a;
      padding: 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .portal-btn {
      background-color: #2563eb;
      color: white !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>

  <!-- 2. Keep the Tailwind CDN here as well -->
  <script src="https://tailwindcss.com"></script>
</head>
<body>

  <!-- Hardcoded styled header -->
  <header class="enterprise-header">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 24px; font-weight: 800; tracking-spacing: -1px;">RUFWORLD TECH</span>
    </div>

    <nav>
      <a href="#services">Services</a>
      <a href="#ai-solutions">AI Solutions</a>
      <a href="#infrastructure">Infrastructure</a>
      <a href="#company">Company</a>
    </nav>

    <div>
      <a href="#portal" class="portal-btn">Engage Portal →</a>
    </div>
  </header>

</body>
</html>
